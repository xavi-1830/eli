<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELI Admin | Manage Institute</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --eli-green: #008751; --eli-red: #D2122E; --sidebar: #1a1a1a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        /* Mobile-First Admin CSS */
        body { background: #f0f2f5; display: flex; flex-direction: column; min-height: 100vh; }
        @media(min-width: 768px) { body { flex-direction: row; } }

        /* Login Screen */
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--sidebar); z-index:5000; display:flex; align-items:center; justify-content:center; padding:20px; }
        .login-card { background:#222; padding:30px; border-radius:15px; width:100%; max-width:350px; text-align:center; color:white; }
        .pass-wrapper { position: relative; width: 100%; }
        .pass-wrapper i { position: absolute; right: 15px; top: 15px; color: #888; cursor: pointer; }
        input[type="text"], input[type="password"] { width:100%; padding:12px; margin-bottom:15px; border-radius:8px; border:1px solid #444; background:#333; color:white; }

        /* Navigation Drawer for Mobile */
        aside { width: 100%; background: var(--sidebar); color: white; padding: 10px; display: flex; flex-direction: row; overflow-x: auto; }
        @media(min-width: 768px) { 
            aside { width: 260px; height: 100vh; flex-direction: column; overflow-x: hidden; position: sticky; top: 0; }
        }
        .nav-item { padding: 12px 20px; cursor: pointer; color: #aaa; white-space: nowrap; font-size: 0.8rem; }
        .nav-item.active { color: var(--eli-green); font-weight: bold; border-bottom: 2px solid var(--eli-green); }
        @media(min-width: 768px) { .nav-item.active { border-bottom: none; border-left: 4px solid var(--eli-green); background: #222; } }

        main { flex: 1; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .btn { padding: 12px; background: var(--eli-green); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; width: 100%; margin-top: 10px; }
        .btn-red { background: var(--eli-red); }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2 style="color:var(--eli-green); margin-bottom:20px;">ELI ADMIN</h2>
        <input type="text" id="admin-user" placeholder="Username">
        <div class="pass-wrapper">
            <input type="password" id="admin-pass" placeholder="Password">
            <i class="fas fa-eye" id="togglePass" onclick="togglePassword()"></i>
        </div>
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px; font-size:0.8rem;">
            <input type="checkbox" id="rememberMe" style="width:auto; margin:0;"> <span>Remember Me</span>
        </div>
        <button class="btn" onclick="checkLogin()">LOGIN</button>
    </div>
</div>

<div id="admin-wrapper" style="display:none; width:100%; flex-direction: inherit;">
    <aside>
        <div class="nav-item active" onclick="show('dash')">Dashboard</div>
        <div class="nav-item" onclick="show('fees')">Fee Override</div>
        <div class="nav-item" onclick="show('ann')">Announcements</div>
    </aside>

    <main>
        <div id="dash" class="admin-sec" style="display:block;">
            <h1>Dashboard</h1>
            <div class="card"><h3>Total Revenue: ₦18.4M</h3></div>
        </div>

        <div id="fees" class="admin-sec" style="display:none;">
            <h1>Fee Override</h1>
            <div class="card">
                <p>Searching: <b>Oyeniran Imoleayo Elizabeth</b></p>
                <p>Current Status: <span id="current-status" style="color:var(--eli-red)">75% Paid</span></p>
                <button class="btn" onclick="unlockFees()">FORCE UNLOCK ALL WEEKS</button>
            </div>
        </div>

        <div id="ann" class="admin-sec" style="display:none;">
            <h1>Announcements</h1>
            <div class="card">
                <textarea id="ann-text" placeholder="Type new announcement..." style="width:100%; height:100px; padding:10px;"></textarea>
                <button class="btn" onclick="postAnn()">PUBLISH TO DASHBOARD</button>
            </div>
        </div>
    </main>
</div>

<script>
    // 1. Password Visibility
    function togglePassword() {
        const passInput = document.getElementById('admin-pass');
        const icon = document.getElementById('togglePass');
        if (passInput.type === "password") {
            passInput.type = "text";
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            passInput.type = "password";
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    // 2. Remember Me & Login
    window.onload = () => {
        if(localStorage.getItem('remembered_user') === 'Munachi') {
            document.getElementById('admin-user').value = 'Munachi';
            document.getElementById('admin-pass').value = 'kyrian1830';
            document.getElementById('rememberMe').checked = true;
        }
    };

    function checkLogin() {
        const u = document.getElementById('admin-user').value;
        const p = document.getElementById('admin-pass').value;
        if(u === 'Munachi' && p === 'kyrian1830') {
            if(document.getElementById('rememberMe').checked) {
                localStorage.setItem('remembered_user', 'Munachi');
            }
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-wrapper').style.display = 'flex';
        } else {
            alert('Invalid Credentials');
        }
    }

    // 3. THE LINK: Data Synchronization
    function unlockFees() {
        localStorage.setItem('elizabeth_fees', 'paid');
        document.getElementById('current-status').innerText = "100% Paid (Synced)";
        document.getElementById('current-status').style.color = "var(--eli-green)";
        alert("Elizabeth's dashboard has been updated!");
    }

    function postAnn() {
        const text = document.getElementById('ann-text').value;
        localStorage.setItem('latest_announcement', text);
        alert("Announcement Published!");
    }

    function show(id) {
        document.querySelectorAll('.admin-sec').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
