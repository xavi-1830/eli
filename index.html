<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELI Student Portal | Imoleayo Elizabeth</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --eli-green: #008751; --eli-yellow: #FFD700; --eli-red: #D2122E; --bg: #F4F7F6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); padding-bottom: 80px; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        header { background: var(--eli-green); padding: 15px 20px; color: white; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
        .dash-profile { background: var(--eli-green); color: white; padding: 20px; border-radius: 0 0 30px 30px; display: flex; align-items: center; gap: 15px; }
        .dash-profile img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--eli-yellow); background: white; }
        .card { background: white; margin: 15px; padding: 18px; border-radius: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .section-title { font-size: 0.8rem; font-weight: 800; color: var(--eli-green); margin: 20px 20px 5px; text-transform: uppercase; }
        .fees-bg { background: #eee; height: 10px; border-radius: 5px; margin: 10px 0; }
        #fees-fill { background: var(--eli-yellow); height: 100%; width: 75%; transition: 1s; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; }
        .nav-item { text-align: center; color: #999; text-decoration: none; font-size: 0.65rem; }
        .nav-item.active { color: var(--eli-green); }
        /* Bot & Chat UI retained from previous versions */
        .alex-trigger { position: fixed; bottom: 90px; right: 20px; display: none; background: var(--eli-green); width: 55px; height: 55px; border-radius: 50%; justify-content: center; align-items: center; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 800;">ELISHA LENE INSTITUTE</div>
    <div onclick="switchPage('notif-page', -1)" style="position:relative">
        <i class="fas fa-bell fa-lg"></i>
        <span id="notif-count" style="position:absolute; top:-5px; right:-5px; background:var(--eli-red); color:white; font-size:0.6rem; padding:2px 5px; border-radius:50%;">3</span>
    </div>
</header>

<div id="dash-page" class="page active">
    <div class="dash-profile">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Elizabeth">
        <div>
            <h2>Oyeniran Imoleayo Elizabeth</h2>
            <p>ELI/NUR/042 | 300 Level</p>
            <p>Nursing | School of Health Sciences</p>
        </div>
    </div>

    <div class="section-title">Latest Announcements</div>
    <div class="card" id="ann-container">
        <!-- Will be populated by Admin -->
        <p style="font-size: 0.75rem; color: #777;">Loading announcements...</p>
    </div>

    <div class="section-title">Finance & Access</div>
    <div class="card">
        <div class="fees-bg"><div id="fees-fill"></div></div>
        <p id="fees-status" style="font-size:0.7rem; color:var(--eli-red); font-weight:700;">Partial Payment: Week 9+ Restricted</p>
    </div>
</div>

<!-- (Rest of the pages: Courses, Results, Profile, Notifications, Chatbot, Receipt Modal - All Kept) -->

<nav class="bottom-nav">
    <a href="#" class="nav-item active" onclick="switchPage('dash-page', 0)"><i class="fas fa-home"></i><br>Dash</a>
    <a href="#" class="nav-item" onclick="switchPage('dash-page', 1)"><i class="fas fa-book"></i><br>Courses</a>
    <a href="#" class="nav-item" onclick="switchPage('dash-page', 2)"><i class="fas fa-poll"></i><br>Results</a>
    <a href="#" class="nav-item" onclick="switchPage('dash-page', 3)"><i class="fas fa-user-circle"></i><br>Profile</a>
</nav>

<script>
    function switchPage(p, idx) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        // (Simplified for demo, you have the full switch logic in your current file)
    }

    // SYNC ENGINE: Listen to Admin changes
    function syncWithAdmin() {
        // 1. Update Fees
        const feeStatus = localStorage.getItem('elizabeth_fees');
        if(feeStatus === 'paid') {
            document.getElementById('fees-fill').style.width = '100%';
            document.getElementById('fees-fill').style.background = 'var(--eli-green)';
            document.getElementById('fees-status').innerHTML = "✓ Full Payment Verified: All Weeks Unlocked";
            document.getElementById('fees-status').style.color = "var(--eli-green)";
        }

        // 2. Update Announcements
        const newAnn = localStorage.getItem('latest_announcement');
        if(newAnn) {
            document.getElementById('ann-container').innerHTML = `
                <div style="display:flex; gap:10px; font-size:0.75rem;">
                    <i class="fas fa-bullhorn" style="color:var(--eli-red)"></i>
                    <p><b>NEW:</b> ${newAnn}</p>
                </div>
            `;
        }
    }

    window.onload = () => {
        syncWithAdmin();
        setInterval(syncWithAdmin, 2000); // Check for updates every 2 seconds
    };
</script>
</body>
</html>
