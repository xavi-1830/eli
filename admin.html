<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ELI Admin | Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --eli-green: #008751; --eli-red: #D2122E; --sidebar: #1a1a1a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        /* Login Screen */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--sidebar); z-index: 5000; display: flex; align-items: center; justify-content: center; color: white; }
        .login-card { background: #222; padding: 40px; border-radius: 15px; width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #444; background: #333; color: white; }
        
        /* Dashboard Layout */
        body { display: none; height: 100vh; background: #f0f2f5; }
        aside { width: 260px; background: var(--sidebar); color: white; display: flex; flex-direction: column; }
        .nav-item { padding: 15px 20px; cursor: pointer; color: #aaa; border-left: 4px solid transparent; }
        .nav-item.active { background: #333; color: white; border-left-color: var(--eli-green); }
        main { flex: 1; padding: 30px; overflow-y: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .admin-sec { display: none; } .admin-sec.active { display: block; }
        .btn { padding: 12px 25px; background: var(--eli-green); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>

<!-- Login Gate -->
<div id="login-overlay">
    <div class="login-card">
        <h2 style="color:var(--eli-green); margin-bottom:20px;">ELI ADMIN LOGIN</h2>
        <input type="text" id="admin-user" placeholder="Username">
        <input type="password" id="admin-pass" placeholder="Password">
        <button class="btn" onclick="checkLogin()" style="width:100%;">LOGIN</button>
        <p id="err" style="color:var(--eli-red); font-size:0.7rem; margin-top:10px; display:none;">Invalid Credentials</p>
    </div>
</div>

<aside>
    <div style="padding: 30px; font-weight: 800; color: var(--eli-green);">ELI MANAGEMENT</div>
    <div class="nav-item active" onclick="show('dash')"><i class="fas fa-chart-line"></i> Dashboard</div>
    <div class="nav-item" onclick="show('upload')"><i class="fas fa-upload"></i> Course Uploader</div>
    <div class="nav-item" onclick="show('res')"><i class="fas fa-file-excel"></i> Result Manager</div>
    <div class="nav-item" onclick="show('fees')"><i class="fas fa-money-bill"></i> Fee Override</div>
    <div class="nav-item" onclick="show('audit')"><i class="fas fa-history"></i> Audit Logs</div>
</aside>

<main>
    <div id="dash" class="admin-sec active"><h1>Dashboard</h1><div class="card"><h3>Total Revenue: N18.4M</h3></div></div>
    <div id="upload" class="admin-sec"><h1>Upload Material</h1><div class="card"><input type="text" placeholder="Topic Name"><br><br><input type="file"><br><br><button class="btn">Publish Module</button></div></div>
    <div id="res" class="admin-sec"><h1>Result Manager</h1><div class="card"><input type="file"><br><br><button class="btn">Bulk Upload CSV</button></div></div>
    <div id="fees" class="admin-sec"><h1>Fee Override</h1><div class="card"><input type="text" placeholder="Search Matric No..."><br><br><button class="btn">Verify & Unlock Weeks</button></div></div>
    <div id="audit" class="admin-sec"><h1>Audit Logs</h1><div class="card"><p>Admin: Munachi Logged In - 10:45 AM</p></div></div>
</main>

<script>
    function checkLogin() {
        const u = document.getElementById('admin-user').value;
        const p = document.getElementById('admin-pass').value;
        if(u === 'Munachi' && p === 'kyrian1830') {
            document.getElementById('login-overlay').style.display = 'none';
            document.body.style.display = 'flex';
        } else {
            document.getElementById('err').style.display = 'block';
        }
    }
    function show(id) {
        document.querySelectorAll('.admin-sec').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
